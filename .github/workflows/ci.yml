name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Create virtual environment
        run: uv venv
      - name: Install dependencies and run checks
        run: |
          source .venv/bin/activate
          uv sync --extra cpu --extra dev
          ruff check .
          ty check

  unit-tests:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: 1
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Create virtual environment
        run: uv venv
      - name: Install dependencies and run tests
        run: |
          source .venv/bin/activate
          uv sync --extra cpu --extra dev --extra tests
          
          # Determine pytest arguments based on event type
          PYTEST_ARGS="-n auto --cov=src --cov-report=xml --cov-report=term"
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "Pull request: running fast tests (excluding slow, parity_heavy, parity_audit)."
            PYTEST_ARGS="$PYTEST_ARGS -m 'not slow and not parity_heavy and not parity_audit'"
          else
            echo "Push to main: excluding parity_heavy and parity_audit (run in parity workflows)."
            PYTEST_ARGS="$PYTEST_ARGS -m 'not parity_heavy and not parity_audit'"
          fi
          
          pytest $PYTEST_ARGS
      - name: Upload coverage to Codecov
        if: github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  build-and-deploy-docs:
    runs-on: ubuntu-latest
    needs: [quality-checks, unit-tests]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Create virtual environment
        run: uv venv
      - name: Install dependencies and build docs
        run: |
          source .venv/bin/activate
          uv pip install .[docs]
          cd docs/
          make html
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/build/html
